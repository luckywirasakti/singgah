<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe6f5"/>
      <stop offset="1" stop-color="#f3ead0"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="32" height="32" rx="8"/>
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="32" height="32" fill="url(#sky)"/>
    <!-- sun -->
    <circle cx="22.5" cy="10.5" r="4.5" fill="#ffd66b"/>
    <!-- sea with rolling waves -->
    <path d="M0 19 Q8 15 16 19 T32 19 V32 H0 Z" fill="#3bb5cc"/>
    <path d="M0 23 Q8 19.5 16 23 T32 23 V32 H0 Z" fill="#2f9fb6"/>
    <!-- little sailboat -->
    <path d="M12.8 17.4 h6 l-1.1 2.4 h-3.8 z" fill="#ffffff"/>
    <path d="M15.7 11 v5.6 l3.1 -0.1 z" fill="#fdfdfd"/>
  </g>
</svg>
